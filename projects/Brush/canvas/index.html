<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Window Brush Shake Color</title>
<link rel="stylesheet" href="../../../common.css">
<link rel="stylesheet" href="../css/canvas.css">
<script defer src="../../../js/projects.js"></script>
<script defer src="../../../js/index.js"></script>
<script defer src="../js/utils.js"></script>
<script defer src="../js/camera.js"></script>
<script defer src="../js/render.js"></script>
<script defer src="../js/ui.js"></script>
<script defer src="../js/main.js"></script>
</head>

<body>

<button class="random-btn" onclick="navigateToRandomProject()">⚡ Random</button>
<a href="../../../index.html" class="home-btn">← Home</a>

<div id="ui">

    <button id="reset">Reset</button>
    <button id="save">Save PNG</button>

    <hr>

    <div class="control">
        <label>Base Color</label>
        <input type="color" id="colorPicker" value="#ffffff">
    </div>

    <div class="control">
        <label>
            Speed Effect
            <input type="checkbox" id="speedToggle" checked>
        </label>
        <input type="range" id="speedPower" min="0" max="2" step="0.01" value="1">
    </div>

    <div class="control">
        <label>
            Width Effect
            <input type="checkbox" id="widthToggle" checked>
        </label>
        <input type="range" id="widthPower" min="0" max="2" step="0.01" value="1">
    </div>

    <div class="control">
        <label>
            Shake Color
            <input type="checkbox" id="shakeToggle" checked>
        </label>
        <input type="range" id="shakePower" min="0" max="2" step="0.01" value="1">
    </div>

</div>

<canvas id="c"></canvas>

</body>
</html>
