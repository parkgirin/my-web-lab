<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web Lab</title>

<link rel="stylesheet" href="common.css">

<script src="js/projects.js"></script>
</head>

<body>

<header>
    <h1>WEB LAB</h1>
    <p>Interactive experiments / canvas systems / UI rules / simulations</p>
</header>

<div id="grid"></div>

<script>
const grid = document.getElementById("grid");

(window.allProjects || []).forEach(project => {

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
        <h2>${project.name}</h2>
        <p>${project.desc}</p>
        <div class="tag">${project.tag}</div>
    `;

    card.addEventListener("click", () => {
        window.location.href = getProjectPath(project.folder);
    });

    grid.appendChild(card);
});
</script>

</body>
</html>
